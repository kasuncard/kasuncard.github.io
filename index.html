<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.6/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.6/dist/flatpickr.min.js"></script>
<title>Stop it</title>
</head>
<body class="bg-orange-100">
<div class="container mx-auto mt-4">

<div class="bg-rose-500 py-5 text-white header-bg">
    <h1 class="text-4xl font-bold pl-8 header-text text-center">Stop it</h1>
    <h2 class="text-2xl font-bold pl-8 header-text text-center">Лети стильно, останавливайся с умом</h2>
</div>
<div class="bg-white rounded-xl mx-8 px-12 py-8 mt-4 shadow-lg">
<h2 class="text-2xl font-semibold text-rose-600">Расскажите о себе</h2>
<form id="dataForm" class="flex flex-col gap-y-6">
<div>
<label for="fullName" class="block text-base font-medium text-black mt-3">Ваше имя:</label>
<input type="text" class="border rounded-lg p-2 w-full" id="fullName" required>
</div>
<div class="">
    <label for="dob" class="block text-black text-base font-medium mt-2">Дата рождения:</label>
    <input type="text" id="dob" name="dob" class="shadow appearance-none border rounded w-1/2 py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
</div>
<div>
<label class="block text-base font-medium text-black">Категория:</label>
<div class="flex">
<input type="radio" name="category" value="employee" id="employee" class="mr-2 mt-1">
<label for="employee">Сотрудница</label>
<input type="radio" name="category" value="student" id="student" class="mx-3 mt-1">
<label for="student">Студентка</label>
<input type="radio" name="category" value="entrepreneur" id="entrepreneur" class="mx-3 mt-1">
<label for="entrepreneur">Предпринимательца</label>
</div>
</div>

<div>
<label class="block text-base font-medium text-black">Сфера интересов:</label>
<input type="checkbox" name="interest" value="reading" id="reading" class="mr-2 mt-1">
<label for="reading">Чтение</label>
<input type="checkbox" name="interest" value="sport" id="sport" class="mx-2 mt-1">
<label for="sport">Спорт</label>
<input type="checkbox" name="interest" value="design" id="design" class="mx-2 mt-1">
<label for="design">Дизайн</label>
<input type="checkbox" name="interest" value="physics" id="physics" class="mx-2 mt-1">
<label for="physics">Физика</label>
<input type="checkbox" name="interest" value="astronomy" id="astronomy" class="mx-2 mt-1">
<label for="astronomy">Астрономия</label>
</div>

<div>
<label for="photo" class="block text-base font-medium text-black">Загрузка фото:</label>
<input type="file" id="photo" accept="image/jpeg, image/png"">
</div>

<!-- ЗАМЕНИТЬ НА saveData!!!-->
<button type="button" class="bg-rose-500 text-white w-1/2 mx-auto rounded-xl py-2 mt-6"
onclick="saveData()">Сохранить</button>
</form>

<div class="flex w-full mt-6">
<button type="button" class="bg-black text-white w-1/2 mx-auto rounded-xl py-2"
onclick="showData()">Показать данные</button>
</div>

<!— Добавьте после кнопки "Показать данные" —>
<div id="nextPageButtonContainer" class="flex w-full mt-6 hidden">
<button type="button" class="bg-rose-500 text-white w-1/2 mx-auto rounded-xl py-2 mt-6"
onclick="goTo('average')">Средний расчёт топлива</button>
<button type="button" class="bg-rose-500 text-white w-1/2 mx-auto rounded-xl py-2 mt-6 ml-2"
onclick="goTo('general')">Общий расчёт топлива</button>
<button type="button" class="bg-rose-500 text-white w-1/2 mx-auto rounded-xl py-2 mt-6 ml-2"
onclick="goTo('stop')">Расчёт тормозного пути</button>
</div>
</div>

<div id="average" class="bg-orange-100 p-25 mt-10 hidden">
<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-md">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Расчеты среднего расхода топлива</h2>
<!— Форма сбора данных —>
<form id="calculationFormAverage">
<div class="mb-4">
<label for="way" class="block text-base font-medium text-black">Сколько километров Вы проехали?</label>
<input type="number" id="way" name="way" class="mt-1 p-2 border rounded w-full"
required>
</div>
<div class="mb-4">
<label for="volume" class="block text-base font-medium text-black">Сколько литров топлива было израсходовано?</label>
<input type="number" id="volume" name="volume"
class="mt-1 p-2 border rounded w-full" required>
</div>
<button type="button" onclick="calculateAverage()" class="bg-fuchsia-600 text-white w-1/2 mx-auto rounded-xl py-2 mt-6">Рассчитать</button>
</form>
</div>
</div>

<div id="general" class="bg-orange-100 p-25 mt-10 hidden">
<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-md">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Расчеты общего расхода топлива</h2>
<!— Форма сбора данных —>
<form id="calculationFormGeneral">
<div class="mb-4">
<label for="planWay" class="block text-base font-medium text-black">Сколько километров Вы планируете преодолеть?</label>
<input type="number" id="planWay" name="planWay" class="mt-1 p-2 border rounded w-full"
required>
</div>
<div class="mb-4">
<label for="cost" class="block text-base font-medium text-black">Каков расход топлива на 100 километров?</label>
<input type="number" id="cost" name="cost"
class="mt-1 p-2 border rounded w-full" required>
</div>
<div class="mb-4">
<label for="price" class="block text-base font-medium text-black">Какова стоимость одного литра топлива?</label>
<input type="number" id="price" name="price"
class="mt-1 p-2 border rounded w-full" required>
</div>
<button type="button" onclick="calculateGeneral()" class="bg-fuchsia-600 text-white w-1/2 mx-auto rounded-xl py-2 mt-6">Рассчитать</button>
</form>
</div>
</div>

<div id="stop" class="bg-orange-100 p-25 mt-10 hidden">
<div class="bg-white rounded-xl mx-8 px-12 py-8 mt-4 shadow-lg">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Расчеты тормозного пути</h2>
<!— Форма сбора данных —>
<form id="calculationFormStop">
<div class="mb-4">
<label for="speed" class="block text-base font-medium text-black">Какова Ваша скорость?</label>
<input type="number" id="speed" name="speed" class="mt-1 p-2 border rounded w-full"
required>
</div>
<div>
<label class="block text-base font-medium text-black">Тип дорожного покрытия:</label>
<div class="flex">
<input type="radio" name="type" value="asphalt" id="asphalt" class="mr-2 mt-1">
<label for="asphalt">Сухой асфальт</label>
<input type="radio" name="type" value="masphalt" id="masphalt" class="mx-3 mt-1">
<label for="masphalt">Мокрый асфальт/сухая брусчатка</label>
<input type="radio" name="type" value="sand" id="sand" class="mx-3 mt-1">
<label for="sand">Влажные песок/брусчатка</label>
<input type="radio" name="type" value="snow" id="snow" class="mx-3 mt-1">
<label for="snow">Сухой песок/снег</label>
<input type="radio" name="type" value="ice" id="ice" class="mx-3 mt-1">
<label for="ice">Ледяная корка</label>
</div>
</div>
<button type="button" class="bg-fuchsia-600 text-white w-1/2 mx-auto rounded-xl py-2 mt-6"
onclick="calculateStop()">Рассчитать</button>
</form>
</div>
</div>

<!— Окно для отображения сохраненных данных —>
<div id="showAverage" class="mt-8 hidden">
<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-md">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Результаты</h2>
<form id="averageForm">
<div class="mb-4">
<label for="averageVolume" class="block text-base font-medium text-black">Средний расход топлива</label>
<input type="text" id="averageVolume" name="averageVolume" class="mt-1 p-2 border rounded w-full" readonly>
</div>
</div>
</div>

<div id="showGeneral" class="mt-8 hidden">
<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-md">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Результаты</h2>
<form id="generalForm">
<div class="mb-4">
<label for="generalVolume" class="block text-base font-medium text-black">Общий расход топлива</label>
<input type="text" id="generalVolume" name="generalVolume" class="mt-1 p-2 border rounded w-full" readonly>
</div>
<div class="mb-4">
<label for="generalRate" class="block text-base font-medium text-black">Общая стоимость</label>
<input type="text" id="generalRate" name="generalRate" class="mt-1 p-2 border rounded w-full" readonly>
</div>
<div class="mb-4">
<label for="rateForKm" class="block text-base font-medium text-black">Стоимость одного километра</label>
<input type="text" id="rateForKm" name="rateForKm" class="mt-1 p-2 border rounded w-full" readonly>
</div>
</div>
</div>

<div id="showStop" class="mt-8 hidden">
<div class="max-w-lg mx-auto bg-white p-6 rounded-xl shadow-md">
<h2 class="text-2xl font-bold mb-4 text-fuchsia-600">Результаты</h2>
<form id="stopForm">
<div class="mb-4">
<label for="stopWay" class="block text-base font-medium text-black">Тормозной путь (в м)</label>
<input type="text" id="stopWay" name="stopWay" class="mt-1 p-2 border rounded w-full" readonly>
</div>
</div>
</div>


<script>
    flatpickr("#dob", {
       dateFormat: "Y-m-d",
    });

function saveData() {
const file = document.getElementById('photo')
const filename = file.files[0].name;
const formData = {
fullName: document.getElementById('fullName').value,
birthYear: document.getElementById('dob').value,
category: document.querySelector('input[name="category"]:checked').value,
interests: Array.from(document.querySelectorAll('input[name="interest"]:checked')).map(checkbox => checkbox.value),
filename: filename,
};
localStorage.setItem('userData', JSON.stringify(formData));
alert('Данные сохранены!');
// Отображение кнопки для перехода на следующую страницу
document.getElementById('nextPageButtonContainer').classList.remove('hidden');
}

function showData() {
const storedData = localStorage.getItem('userData');
if (storedData) {
alert('Ваши данные:\n\n' + storedData);
} else {
alert('Нет данных.');
}
}

function goTo(contentId) {
document.getElementById('general').classList.add('hidden');
document.getElementById('average').classList.add('hidden');
document.getElementById('stop').classList.add('hidden');
document.getElementById('showAverage').classList.add('hidden');
document.getElementById('showGeneral').classList.add('hidden');
document.getElementById('showStop').classList.add('hidden');

// Переход на другую страницу (замените "nextPage.html" на имя вашей следующей страницы)
document.getElementById(contentId).classList.remove('hidden');
}

function calculateAverage() {
// Получение значений из формы
const way = parseFloat(document.getElementById('way').value);
const volume = parseFloat(document.getElementById('volume').value);
average = volume/way;
// Показать результаты расчета
showAverage(average)
}

function showAverage(average) {
if (average) {
document.getElementById('averageVolume').value = average.toFixed(2);
document.getElementById('showAverage').classList.remove('hidden');
}
}

function calculateGeneral() {
// Получение значений из формы
const way = parseFloat(document.getElementById('planWay').value);
const cost = parseFloat(document.getElementById('cost').value);
const price = parseFloat(document.getElementById('price').value);
if (way && cost && price)
{
general = cost*way/100;
rate=general*price;
rate_for_km=rate/way;
// Показать результаты расчета
showGeneral(general,rate,rate_for_km)
}
}

function showGeneral(general,rate,rate_for_km) {
document.getElementById('generalVolume').value = general.toFixed(2);
document.getElementById('generalRate').value = rate.toFixed(2);
document.getElementById('rateForKm').value = rate_for_km.toFixed(2);
document.getElementById('showGeneral').classList.remove('hidden');
}

function calculateStop() {
// Получение значений из формы
const speed = parseFloat(document.getElementById('speed').value);
const cat = document.querySelector('input[name="type"]:checked').value;
if (speed && cat)
{
k=1;
if (cat=='asphalt')
{
	k=0.8;
}
else if (cat=='masphalt')
{
	k=0.6;
}
else if (cat=='sand')
{
	k=0.4;
}
else if (cat=='snow')
{
	k=0.25;
}
else
{
	k=0.1;
}
stop_way = speed*speed/(250*k);
// Показать результаты расчета
showStop(stop_way)
}
}

function showStop(way) {
document.getElementById('stopWay').value = way.toFixed(2);
document.getElementById('showStop').classList.remove('hidden');
}



</script>
</body>

</html>
